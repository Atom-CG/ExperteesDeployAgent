name: Publish Release

on:
  push:
    tags:
      - 'v*' # Se déclenche uniquement quand tu pousses un tag qui commence par v (ex: v1.0.0)

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Installation des dépendances
        run: npm ci

      - name: Compilation du package VSIX
        run: npx vsce package

      - name: Création de la Release GitHub
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Géré automatiquement par GitHub